dos_checks_status_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  let disp = (raw==null || raw==='unavailable' || raw==='unknown') ? '—' : raw;\n  if (disp!=='—') disp = disp.charAt(0).toUpperCase() + (variables.usc ? disp.slice(1).replace(/_/g,' ') : disp.slice(1));\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.txt}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:var(--dos-accent); white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
dos_checks_target_row:
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const v = e ? parseFloat(e.state) : NaN;\n  const c = isNaN(v) ? '—' : v.toFixed(1).replace('.', ',');\n  return `<div style=\"display:flex; align-items:center;\">\n    <span style=\"flex:1; min-width:0; font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text);\">${variables.txt}</span>\n    <span style=\"width:52px; text-align:right; font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums;\">${c}&deg;</span></div>`;\n]]]\n"
  triggers_update: all
