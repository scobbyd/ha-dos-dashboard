  label: "[[[\n  const s = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = s ? s.state : null;\n  let disp = '—';\n  if (!(raw==null || raw==='unavailable' || raw==='unknown')) {\n    const m = raw.match(/(\\d{2}):(\\d{2})/);\n    disp = m ? (m[1]+':'+m[2]) : raw;\n  }\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_section_header:
