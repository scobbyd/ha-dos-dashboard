# _anchor_defs is not a lovelace/button-card key; it only hosts the YAML anchor
# definitions shared across this file, so deleting/reordering templates can't
# break aliases. pad0/lineh1/minw0 are single style entries; show_label_only is
# the standard button-card flag set (use via `<<: *show_label_only`); the
# label_* anchors are the four canonical label style lists.
_anchor_defs:
- &pad0
  padding: '0'
- &lineh1
  line-height: '1'
- &minw0
  min-width: '0'
- &show_label_only
  show_icon: false
  show_name: false
  show_state: false
  show_label: true
- &label_left
  - font-family: inherit
  - text-align: left
  - justify-self: stretch
  - *pad0
- &label_left_wrap
  - font-family: inherit
  - text-align: left
  - justify-self: stretch
  - *pad0
  - white-space: normal
  - overflow: visible
- &label_right
  - font-family: inherit
  - text-align: right
  - justify-self: end
  - *pad0
- &label_center
  - font-family: inherit
  - *pad0
  - justify-self: stretch
  - text-align: center
dos_stepper_minus:
  <<: *show_label_only
  styles:
    card:
    - border: 0.8px solid var(--dos-soft)
    - width: 20px
    - height: 20px
    - *pad0
    - margin: 0 8px 0 0
    - align-self: center
    label:
    - font-family: inherit
    - font-size: 14px
    - color: var(--dos-soft)
    - *lineh1
  label: −
dos_stepper_plus:
  template: dos_stepper_minus
  label: +
  styles:
    card:
    - margin: 0 0 0 8px
dos_label_cell:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - padding: 6px 0
    - *minw0
    label:
    - font-family: inherit
    - text-align: left
    - justify-self: stretch
    - *pad0
    - white-space: normal
  label: '[[[ return `<div style="flex:1; min-width:0; font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-text); line-height:1.25;">${variables.k}<span style="color:var(--dos-quiet); margin-left:5px; font-size:clamp(9px,0.85cqw,10.5px);">${variables.unit}</span></div>`; ]]]'
dos_value_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const vr = variables || {};\n  const eid = (entity && entity.entity_id) ? entity.entity_id : null;\n  const s = eid ? states[eid] : null;\n  const raw = (vr.src==='attr') ? ((s && s.attributes) ? s.attributes[vr.attr] : null) : (s ? s.state : null);\n  const v = (raw==null || raw==='unavailable' || raw==='unknown') ? null : parseFloat(raw);\n  let disp;\n  if (v==null || isNaN(v)) disp = '—';\n  else if (vr.fmt==='int') disp = Math.round(v).toLocaleString('de-DE');\n  else if (vr.fmt==='dec2') disp = v.toFixed(2).replace('.', ',');\n  else disp = v.toFixed(vr.fmt==='dec0'?0:1).replace('.', ',');\n  const last = vr.last ? 'none' : '0.6px solid var(--dos-line)';\n  const sub = vr.sub ? `<span style=\"color:var(--dos-quiet); margin-left:6px; font-size:clamp(10px,0.95cqw,12px);\">${vr.sub}</span>` : '';\n  const vcol = vr.accent ? 'var(--dos-accent)' : 'var(--dos-ink)';\n  const u = (vr.unit && disp!=='—') ? `<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">${vr.unit}</span>` : '';\n  const k = (vr.k==null) ? '' : vr.k;\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${k}${sub}</span>\n    <span style=\"font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:${vcol}; font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}${u}</span></div>`;\n]]]\n"
dos_stepper_minus_plain:
  template: dos_stepper_minus
  styles:
    card:
    - width: 18px
    - height: 18px
    - margin: 0 7px 0 0
    label:
    - font-size: 13px
dos_stepper_plus_plain:
  template: dos_stepper_plus
  styles:
    card:
    - width: 18px
    - height: 18px
    - margin: 0 0 0 7px
    label:
    - font-size: 13px
# Action mixins for the steppers above. Combine in a template list, e.g.
#   template: [dos_stepper_minus_plain, dos_step_climate_minus]
# The tap_action targets the card's own entity, so call sites only set
# `entity:` (plus min/max/step variables where the defaults don't fit).
dos_step_climate_minus:
  variables:
    min: 16
    max: 30
    step: 0.5
    fallback: 20
  tap_action:
    action: perform-action
    perform_action: climate.set_temperature
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
    data:
      temperature: '[[[ const t = (entity && entity.attributes) ? parseFloat(entity.attributes.temperature) : NaN; return isNaN(t) ? variables.fallback : Math.max(variables.min, t - variables.step); ]]]'
dos_step_climate_plus:
  variables:
    min: 16
    max: 30
    step: 0.5
    fallback: 20
  tap_action:
    action: perform-action
    perform_action: climate.set_temperature
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
    data:
      temperature: '[[[ const t = (entity && entity.attributes) ? parseFloat(entity.attributes.temperature) : NaN; return isNaN(t) ? variables.fallback : Math.min(variables.max, t + variables.step); ]]]'
dos_step_number_minus:
  variables:
    min: 0
    max: 100
    step: 1
  tap_action:
    action: perform-action
    perform_action: input_number.set_value
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
    data:
      value: '[[[ if (!entity) return; const v = parseFloat(entity.state); const n = isNaN(v) ? variables.min : v - variables.step; return Math.max(variables.min, Math.round(n/variables.step)*variables.step); ]]]'
dos_step_number_plus:
  variables:
    min: 0
    max: 100
    step: 1
  tap_action:
    action: perform-action
    perform_action: input_number.set_value
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
    data:
      value: '[[[ if (!entity) return; const v = parseFloat(entity.state); const n = isNaN(v) ? variables.min : v + variables.step; return Math.min(variables.max, Math.round(n/variables.step)*variables.step); ]]]'
# Increment/decrement mixins: the helper's own min/max/step apply.
dos_step_decrement:
  tap_action:
    action: perform-action
    perform_action: input_number.decrement
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
dos_step_increment:
  tap_action:
    action: perform-action
    perform_action: input_number.increment
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
# dos_value_span: right-aligned numeric span (beside steppers / in field
# rows). variables: fmt (dec1 default | int/dec0 -> rounded de-DE | dec2),
# unit (omitted when empty), w (card width), small (compact fonts).
# Wrappers below: dos_heating_target_value (+more-info),
# dos_energy_value (56px compact, +more-info), dos_value_int_span
# (56px compact rounded %).
dos_value_span:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  variables:
    fmt: dec1
    unit: ''
    w: 74px
    small: false
  styles:
    card:
    - *pad0
    - width: '[[[ return variables.w ]]]'
    - align-self: center
    label: *label_right
  label: "[[[\n  const raw = ((entity && entity.entity_id ? states[entity.entity_id] : null)||{}).state;\n  const v = (raw==null||raw==='unavailable'||raw==='unknown') ? null : parseFloat(raw);\n  let disp;\n  if (v==null||isNaN(v)) disp = '—';\n  else if (variables.fmt==='int'||variables.fmt==='dec0') disp = Math.round(v).toLocaleString('de-DE');\n  else if (variables.fmt==='dec2') disp = v.toFixed(2).replace('.', ',');\n  else disp = v.toFixed(1).replace('.', ',');\n  const uSz = variables.small ? 'clamp(8.5px,0.8cqw,10px)' : 'clamp(9px,0.85cqw,10.5px)';\n  const vSz = variables.small ? 'clamp(12px,1.1cqw,13.5px)' : 'clamp(12.5px,1.15cqw,14px)';\n  const u = variables.unit ? `<span style=\"font-size:${uSz}; font-weight:400; color:var(--dos-soft); margin-left:2px;\">${variables.unit}</span>` : '';\n  return `<span style=\"font-size:${vSz}; font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}${u}</span>`;\n]]]\n"
dos_energy_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const vr = variables || {};\n  const num = (id) => { if(!id) return null; const s = states[id]; const r = s ? s.state : null;\n    return (r==null||r==='unavailable'||r==='unknown') ? null : parseFloat(r); };\n  const w = num(vr.e_now);\n  let k = num(vr.e_kwh);\n  if (k!=null && !isNaN(k) && vr.kdiv) k = k / vr.kdiv;\n  const wD = (w==null||isNaN(w)) ? '—' : Math.round(w).toLocaleString('de-DE');\n  const kD = (k==null||isNaN(k)) ? '—' : k.toFixed(2).replace('.', ',');\n  const border = vr.last ? 'none' : '0.6px solid var(--dos-line)';\n  const sub = vr.sub ? `<span style=\"color:var(--dos-quiet); margin-left:6px; font-size:clamp(9px,0.85cqw,10.5px);\">${vr.sub}</span>` : '';\n  const kCol = 'var(--dos-accent2)';\n  return `<div style=\"display:grid; grid-template-columns:1fr 50px 52px; column-gap:6px; align-items:baseline; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${border};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">${vr.k}${sub}</span>\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap;\">${wD}</span>\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); font-weight:600; color:${kCol}; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap;\">${kD}</span>\n  </div>`;\n]]]\n"
dos_daynight_toggle_day:
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_center
  label: "[[[\n  const night = (states['input_boolean.dossier_night_mode'] || {}).state === 'on';\n  const ink = night ? '#f2efe8' : '#0d1b2a';\n  const paper = night ? '#17140f' : '#f5f5f4';\n  const quiet = night ? '#6e6a62' : '#8a8a8a';\n  const active = !night;\n  return `<span style=\"display:block; background:${active ? ink : 'transparent'}; color:${active ? paper : quiet}; font-family:inherit; font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; line-height:1.4; padding:3px 11px; white-space:nowrap;\">Day</span>`;\n]]]\n"
dos_daynight_toggle_night:
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_center
  label: "[[[\n  const night = (states['input_boolean.dossier_night_mode'] || {}).state === 'on';\n  const ink = night ? '#f2efe8' : '#0d1b2a';\n  const paper = night ? '#17140f' : '#f5f5f4';\n  const quiet = night ? '#6e6a62' : '#8a8a8a';\n  const line = night ? '#38332c' : '#d4d4d4';\n  const active = night;\n  return `<span style=\"display:block; background:${active ? ink : 'transparent'}; color:${active ? paper : quiet}; font-family:inherit; font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; line-height:1.4; padding:3px 11px; white-space:nowrap; border-left:1px solid ${line};\">Night</span>`;\n]]]\n"
dos_state_text_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const s = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = s ? s.state : null;\n  const disp = (raw==null || raw==='unavailable' || raw==='unknown') ? '—' : raw.replace(/_/g,' ');\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  const vcol = variables.accent ? 'var(--dos-accent)' : 'var(--dos-ink)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(10.5px,1cqw,12px); font-weight:600; color:${vcol}; letter-spacing:0.06em; text-transform:uppercase; font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_clock_time:
  tap_action:
    action: none
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - padding: 0 0 16px 0
    label: *label_right
  label: "[[[\n  const time = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});\n  return `<div style=\"font-size:clamp(16px,1.8cqw,23px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; letter-spacing:0.02em; text-align:right; white-space:nowrap;\">${time}</div>`;\n]]]\n"
dos_view_header:
  <<: *show_label_only
  triggers_update: all
  tap_action:
    action: none
  styles:
    card:
    - padding: 0 0 16px 0
    - *minw0
    label: *label_left
  label: "[[[\n  return `\n    <div style=\"min-width:0;\">\n      <div style=\"font-size:clamp(20px,2.4cqw,32px); font-weight:700; color:var(--dos-ink); letter-spacing:-0.01em; line-height:1.05;\">${variables.title}</div>\n    </div>`;\n]]]\n"
dos_binary_word_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const s = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = s ? s.state : null;\n  const on = raw === 'on';\n  const unk = (raw==null || raw==='unavailable' || raw==='unknown');\n  const disp = unk ? '—' : (on ? variables.on_txt : variables.off_txt);\n  const col = unk ? 'var(--dos-quiet)' : (on ? 'var(--dos-accent)' : 'var(--dos-quiet)');\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); font-weight:600; color:${col}; letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_section_caption:
  tap_action:
    action: none
  <<: *show_label_only
  styles:
    card:
    - padding: 10px 0 4px 0
    label: *label_left
  label: '[[[ return `<span style="font-size:clamp(9px,0.85cqw,10.5px); color:var(--dos-quiet); letter-spacing:0.06em; text-transform:uppercase;">${variables.title}</span>`; ]]]

    '
dos_table_header:
  tap_action:
    action: none
  <<: *show_label_only
  styles:
    card:
    - *pad0
    label: *label_left
  label: "[[[\n  return `<div style=\"display:flex; align-items:baseline; font-size:clamp(9px,0.85cqw,10.5px); color:var(--dos-quiet); letter-spacing:0.06em; text-transform:uppercase; padding-bottom:6px; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"flex:1; min-width:0;\">Zone</span>\n    <span style=\"width:52px; text-align:right;\">Actual</span>\n    <span style=\"width:88px; text-align:right;\">Set</span>\n    <span style=\"width:52px; text-align:right;\">Mode</span>\n  </div>`;\n]]]\n"
dos_time_window_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  let disp = '—';\n  if (raw && raw!=='unavailable' && raw!=='unknown') {\n    const parts = raw.split(':');\n    disp = (parts.length>=2) ? `${parts[0]}:${parts[1]}` : raw;\n  }\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_temp_unit_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  let disp = (raw==null || raw==='unavailable' || raw==='unknown') ? '—' : raw;\n  const num = parseFloat(disp);\n  const unit = (e && e.attributes && e.attributes.unit_of_measurement) ? e.attributes.unit_of_measurement : '';\n  if (disp!=='—' && !isNaN(num) && disp.trim() === String(num)) disp = Math.round(num).toLocaleString('de-DE');\n  const u = (disp!=='—' && unit) ? `<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">${unit}</span>` : '';\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}${u}</span></div>`;\n]]]\n"
dos_text_pair_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  styles:
    card:
    - *pad0
    label: *label_left
  label: "[[[\n  return `<div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; padding:clamp(5px,0.6cqw,6.5px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; color:var(--dos-accent); white-space:nowrap;\">Mark</span></div>`;\n]]]\n"
dos_state_string_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left
  label: "[[[\n  const s = (states[entity.entity_id]||{}).state;\n  const disp = (s==null||s==='unavailable'||s==='unknown') ? '—' : s;\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(11px,1.0cqw,12.5px); font-weight:600; color:var(--dos-accent2); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_value_int_span:
  template: dos_value_span
  variables:
    w: 56px
    small: true
    fmt: int
    unit: '%'
dos_binary_word_accent_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const s = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = s ? s.state : null;\n  if (raw==null||raw==='unavailable'||raw==='unknown') {\n    var disp='—', col='var(--dos-quiet)';\n  } else {\n    const on = raw==='on';\n    var disp = on ? variables.on_word : variables.off_word;\n    var col = on ? (variables.on_accent ? 'var(--dos-accent)' : 'var(--dos-quiet)') : 'var(--dos-accent2)';\n  }\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:${col}; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
dos_time_window_match_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  triggers_update: all
  styles:
