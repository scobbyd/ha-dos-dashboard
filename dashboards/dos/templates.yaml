dos_gauge:
  tap_action:
    action: more-info
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  const v = (raw==null||raw==='unavailable'||raw==='unknown') ? null : parseFloat(raw);\n  const max = variables.mx;\n  const mag = (v==null||isNaN(v)) ? v : (variables.abs ? Math.abs(v) : v);\n  const pct = (v==null||isNaN(v)) ? 0 : Math.max(0, Math.min(100, mag/max*100));\n  const disp = (v==null||isNaN(v)) ? '—' : (mag/1000).toFixed(2).replace('.', ',');\n  const ke = states[variables.ken];\n  const kr = ke ? ke.state : null;\n  const kv = (kr==null||kr==='unavailable'||kr==='unknown') ? null : parseFloat(kr);\n  const kdisp = (kv==null||isNaN(kv)) ? '—' : kv.toFixed(1).replace('.', ',');\n  return `\n    <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n      <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.txt}</span>\n      <span style=\"display:inline-flex; align-items:baseline;\">\n        <span style=\"font-size:clamp(18px,2.2cqw,26px); font-weight:600; font-variant-numeric:tabular-nums; color:${variables.col};\">${disp}<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">kW</span></span>\n        <span style=\"font-size:clamp(11px,1.0cqw,12.5px); font-weight:500; font-variant-numeric:tabular-nums; white-space:nowrap; border-left:0.8px solid var(--dos-line); padding-left:8px; margin-left:9px; color:${variables.kcol};\">${kdisp}<span style=\"font-size:clamp(8px,0.78cqw,9.5px); margin-left:2px; color:var(--dos-soft);\">kWh</span></span>\n      </span>\n    </div>\n    <div style=\"height:4px; background:var(--dos-line); margin-top:6px; position:relative;\">\n      <div style=\"position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:${variables.col};\"></div>\n    </div>\n    <div style=\"display:flex; justify-content:space-between; font-size:clamp(8px,0.8cqw,9px); color:var(--dos-quiet); letter-spacing:0.04em; margin-top:3px; font-variant-numeric:tabular-nums;\"><span>0 kW</span><span>${(max/1000).toFixed(0)} kW</span></div>`;\n]]]\n"
  triggers_update: all
dos_gauge_grid:
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  const w = (raw==null||raw==='unavailable'||raw==='unknown') ? null : parseFloat(raw);\n  const v = (w==null||isNaN(w)) ? null : Math.abs(w)/1000;\n  const max = (variables.mx || 14000)/1000;\n  const pct = (v==null) ? 0 : Math.max(0, Math.min(100, v/max*100));\n  const disp = (v==null) ? '—' : v.toFixed(2).replace('.', ',');\n  const dir = (w==null||isNaN(w)) ? '' : (w < 0 ? 'exporting' : (w > 0 ? 'importing' : 'balanced'));\n  const col = (w==null||isNaN(w)) ? 'var(--dos-soft)' : (w < 0 ? 'var(--dos-accent)' : (w > 0 ? 'var(--dos-accent2)' : 'var(--dos-soft)'));\n  const sub = dir ? `<span style=\"color:var(--dos-quiet); margin-left:6px; font-size:clamp(10px,0.95cqw,12px);\">${dir}</span>` : '';\n  const rd = (id) => { const s = states[id]; const r = s ? s.state : null; const n = (r==null||r==='unavailable'||r==='unknown') ? null : parseFloat(r); return (n==null||isNaN(n)) ? '—' : n.toFixed(1).replace('.', ','); };\n  const expd = rd(variables.expen);\n  const impd = rd(variables.impen);\n  return `\n    <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n      <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.txt}${sub}</span>\n      <span style=\"display:inline-flex; align-items:baseline;\">\n        <span style=\"font-size:clamp(18px,2.2cqw,26px); font-weight:600; font-variant-numeric:tabular-nums; color:${col};\">${disp}<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">kW</span></span>\n        <span style=\"font-size:clamp(11px,1.0cqw,12.5px); font-weight:500; font-variant-numeric:tabular-nums; white-space:nowrap; border-left:0.8px solid var(--dos-line); padding-left:8px; margin-left:9px; color:var(--dos-text);\"><span style=\"color:var(--dos-soft); font-variant:small-caps; text-transform:lowercase; letter-spacing:0.04em; margin-right:3px;\">exp</span>${expd} <span style=\"color:var(--dos-soft); font-variant:small-caps; text-transform:lowercase; letter-spacing:0.04em; margin-right:3px; margin-left:5px;\">imp</span><span style=\"color:var(--dos-accent2);\">${impd}</span><span style=\"font-size:clamp(8px,0.78cqw,9.5px); margin-left:2px; color:var(--dos-soft);\">kWh</span></span>\n      </span>\n    </div>\n    <div style=\"height:4px; background:var(--dos-line); margin-top:6px; position:relative;\">\n      <div style=\"position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:${col};\"></div>\n    </div>\n    <div style=\"display:flex; justify-content:space-between; font-size:clamp(8px,0.8cqw,9px); color:var(--dos-quiet); letter-spacing:0.04em; margin-top:3px; font-variant-numeric:tabular-nums;\"><span>0 kW</span><span>${max.toFixed(0)} kW</span></div>`;\n]]]\n"
  tap_action:
    action: more-info
    entity: sensor.inverter_grid_power
  triggers_update: all
  styles:
    card:
    - padding: 4px 0 8px 0
    label: *label_left_wrap
dos_chart_legend:
  <<: *show_label_only
  label: "[[[\n  const sw = (r) => r.stroke ? `<svg width=\"20\" height=\"8\" style=\"vertical-align:middle; margin-right:5px; overflow:visible;\"><line x1=\"0\" y1=\"4\" x2=\"20\" y2=\"4\" stroke=\"${r.stroke}\" stroke-width=\"2\" stroke-dasharray=\"${r.dash==null?'0':r.dash}\" stroke-linecap=\"${r.cap||'round'}\"></line></svg>` : `<span style=\"display:inline-block; ${r.css} vertical-align:middle; margin-right:5px;\"></span>`;\n  const rows = variables.rows.map((r, i) => `${i ? '&nbsp;&nbsp;' : ''}${sw(r)}${r.label}`).join('\\n    ');\n  return `<div style=\"font-size:clamp(9.5px,0.85cqw,10.5px); color:var(--dos-quiet); letter-spacing:0.03em; line-height:1.5;\">\n    ${rows}\n    <br>${variables.desc}</div>`;\n]]]\n"
  tap_action:
    action: none
  styles:
    card:
    - padding: 0 0 4px 0
    label: *label_left_wrap
dos_energy_field_label:
  <<: *show_label_only
