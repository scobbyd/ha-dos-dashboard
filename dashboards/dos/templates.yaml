# dos_toggle_row: the standard on/off entity row (square indicator, label,
# ON/OFF word; em-dash when unavailable). variables: k (label), small
# (compact 11.5/13px sizing, default false = 12/13.5px), last (suppress the
# hairline under the final row). Tap/hold actions belong to the call site;
# dos_dossier_device_toggle below bakes in toggle/more-info.
dos_toggle_row:
  <<: *show_label_only
  triggers_update: all
  variables:
    k: ''
    small: false
    last: false
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = (e && e.state!=null) ? e.state : null;\n  const known = raw!=null && raw!=='unavailable' && raw!=='unknown';\n  const on = known && raw === 'on';\n  const box = on ? 'background:var(--dos-accent); border:1px solid var(--dos-accent);' : 'background:transparent; border:1px solid var(--dos-quiet);';\n  const txt = !known ? 'var(--dos-quiet)' : (on ? 'var(--dos-ink)' : 'var(--dos-quiet)');\n  const word = !known ? '—' : (on ? 'On' : 'Off');\n  const fk = variables.small ? 'clamp(11.5px,1.05cqw,13px)' : 'clamp(12px,1.1cqw,13.5px)';\n  const pad = variables.small ? 'clamp(5px,0.6cqw,6.5px)' : 'clamp(5px,0.7cqw,7px)';\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; padding:${pad} 0; border-bottom:${last};\">\n    <span style=\"display:flex; align-items:center; gap:9px; font-size:${fk}; color:var(--dos-text); min-width:0;\">\n      <span style=\"width:8px; height:8px; flex:none; ${box}\"></span>${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; color:${txt}; white-space:nowrap;\">${word}</span></div>`;\n]]]\n"
# dos_dossier_device_toggle: dos_toggle_row in compact size with the device
# panel's baked-in actions (tap = toggle, hold = more-info).
dos_dossier_device_toggle:
  template: dos_toggle_row
  variables:
    small: true
  tap_action:
    action: toggle
  hold_action:
    action: more-info
# ---- Plan view (floor plan) templates ------------------------------
# dos_plan_floor_tab: one segment of the Ground/First/Attic switcher.
# variables: lab (display text), opt (input_select option), sep (left rule).
dos_plan_floor_tab:
  <<: *show_label_only
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_center
  label: "[[[\n  const cur = (states['input_select.dossier_plan_floor']||{}).state || 'ground';\n  const active = cur === variables.opt;\n  const sep = variables.sep ? 'border-left:1px solid var(--dos-line);' : '';\n  return `<span style=\"display:block; background:${active ? 'var(--dos-ink)' : 'transparent'}; color:${active ? 'var(--dos-paper)' : 'var(--dos-quiet)'}; font-family:inherit; font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; line-height:1.2; padding:9px 0; white-space:nowrap; text-align:center; ${sep}\">${variables.lab}</span>`;\n]]]\n"
# dos_plan_room: one room cell overlaid on the floor-plan underlay
# (picture-elements element). Ports RoomCell + TintLayer from the design
# prototype: small-caps room name, big tabular temp with drift arrow,
# glyph row (mode dot, lamp glow dot, switch chip, CO2), and a background
# tint = lamplight wash + AC comfort shading (heating terracotta, cooling
# slate; intensity = unit effort calibrated to the real idle points:
# heating idles at +4 over setpoint, cooling at -1.5 under).
# variables: name, kind (sensor|climate|switch|circ), temp_entity,
# climate_entity, co2_entity, switch_entity, light_entity, small.
dos_plan_room:
  <<: *show_label_only
  triggers_update: all
  extra_styles: |
    :host { max-width: none !important; }
  variables:
    name: ''
    kind: circ
    temp_entity: null
    climate_entity: null
    co2_entity: null
    switch_entity: null
    light_entity: null
    small: false
  styles:
    card:
    - *pad0
    - width: 100%
    - height: 100%
    - background: "[[[\n  const V = variables;\n  const layers = [];\n  const lt = V.light_entity ? states[V.light_entity] : null;\n  if (lt && lt.state === 'on') {\n    const bri = (lt.attributes && lt.attributes.brightness != null) ? (lt.attributes.brightness / 255) : 1;\n    layers.push(`color-mix(in srgb, var(--dos-glow) ${Math.round(4 + 18 * bri)}%, transparent)`);\n  }\n  const cl = V.climate_entity ? states[V.climate_entity] : null;\n  if (cl && (cl.state === 'heat' || cl.state === 'cool') && cl.attributes) {\n    const cur = parseFloat(cl.attributes.current_temperature);\n    const set = parseFloat(cl.attributes.temperature);\n    if (!isNaN(cur) && !isNaN(set)) {\n      const d = cur - set;\n      const effort = cl.state === 'heat' ? Math.max(0, Math.min((4 - d) / 6, 1)) : Math.max(0, Math.min((d + 1.5) / 4.5, 1));\n      const tok = cl.state === 'heat' ? '--dos-accent2' : '--dos-accent';\n      layers.push(`color-mix(in srgb, var(${tok}) ${Math.round(6 + effort * 30)}%, transparent)`);\n    }\n  }\n  if (!layers.length) return 'transparent';\n  return layers.map((c) => `linear-gradient(${c}, ${c})`).join(', ');\n]]]"
    label: *label_center
  label: "[[[\n  const V = variables;\n  const get = (id) => id ? states[id] : null;\n  const num = (s) => {\n    if (!s || s.state == null || s.state === 'unavailable' || s.state === 'unknown') return null;\n    const v = parseFloat(s.state);\n    return isNaN(v) ? null : v;\n  };\n  const cl = get(V.climate_entity);\n  let temp = V.temp_entity ? num(get(V.temp_entity)) : null;\n  if (temp == null && cl && cl.attributes) {\n    const ct = parseFloat(cl.attributes.current_temperature);\n    if (!isNaN(ct)) temp = ct;\n  }\n  const target = (cl && cl.attributes) ? parseFloat(cl.attributes.temperature) : NaN;\n  const mode = cl ? cl.state : null;\n  const sw = get(V.switch_entity);\n  const lt = get(V.light_entity);\n  const co2 = num(get(V.co2_entity));\n  const nameSz = V.small ? 'clamp(5.5px,1.8cqw,10px)' : 'clamp(6.5px,2.2cqw,12px)';\n  const tempSz = V.small ? 'clamp(8px,3.1cqw,15px)' : 'clamp(10px,4.7cqw,22px)';\n  let arrow = '';\n  if (temp != null && !isNaN(target) && Math.abs(temp - target) >= 0.7) {\n    arrow = `<span style=\"font-size:55%; color:var(--dos-soft); vertical-align:middle; margin-left:1px;\">${temp > target ? '\\u25B2' : '\\u25BC'}</span>`;\n  }\n  let mid = '';\n  if (temp != null) {\n    mid = `<div style=\"font-size:${tempSz}; font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; margin-top:1px; line-height:1.1;\">${temp.toFixed(1).replace('.', ',')}&deg;${arrow}</div>`;\n  } else if (V.kind === 'sensor') {\n    mid = `<div style=\"font-size:${nameSz}; color:var(--dos-quiet); margin-top:2px;\">${V.temp_entity ? '\\u2014' : 'no sensor'}</div>`;\n  }\n  const chips = [];\n  if (mode === 'heat' || mode === 'cool') {\n    chips.push(`<span style=\"width:5px; height:5px; border-radius:50%; background:var(${mode === 'heat' ? '--dos-accent2' : '--dos-accent'});\"></span>`);\n  }\n  if (lt && lt.state === 'on') {\n    chips.push(`<span style=\"width:7px; height:7px; border-radius:50%; border:1px solid var(--dos-soft); background:var(--dos-glow);\"></span>`);\n  }\n  if (sw) {\n    const on = sw.state === 'on';\n    chips.push(`<span style=\"font-size:${V.small ? 'clamp(5px,1.5cqw,8px)' : 'clamp(6px,1.8cqw,10px)'}; letter-spacing:0.06em; text-transform:uppercase; font-weight:700; color:var(${on ? '--dos-ink' : '--dos-quiet'}); border:0.8px solid var(${on ? '--dos-ink' : '--dos-line'}); padding:0 3px;\">${on ? 'On' : 'Off'}</span>`);\n  }\n  if (co2 != null) {\n    chips.push(`<span style=\"font-size:clamp(6px,1.8cqw,10px); color:var(${co2 > 800 ? '--dos-accent2' : '--dos-quiet'}); font-variant-numeric:tabular-nums;\">${Math.round(co2)} CO&#8322;</span>`);\n  }\n  const chipRow = chips.length ? `<div style=\"display:flex; gap:4px; justify-content:center; align-items:center; margin-top:2px; flex-wrap:wrap;\">${chips.join('')}</div>` : '';\n  return `<div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; line-height:1.1; overflow:hidden;\">\n    <div style=\"font-size:${nameSz}; letter-spacing:0.09em; text-transform:uppercase; color:var(--dos-quiet); font-weight:700; white-space:nowrap;\">${V.name}</div>${mid}${chipRow}</div>`;\n]]]\n"
# dos_plan_close: right-aligned small-caps control that clears the
# selected plan room (detail bar close button).
dos_plan_close:
  <<: *show_label_only
  styles:
    card:
    - *pad0
    - width: 60px
    - align-self: center
    label: *label_right
  label: '[[[ return `<span style="font-variant:small-caps; text-transform:lowercase; letter-spacing:0.08em; font-weight:600; font-size:clamp(10px,0.95cqw,12px); color:var(--dos-quiet);">close &times;</span>`; ]]]'
# dos_plan_rail_header: landscape-rail masthead — the active floor's
# title, typeset identically to dos_view_header so the Plan view reads
# like the other views.
dos_plan_rail_header:
  <<: *show_label_only
  triggers_update: all
  tap_action:
    action: none
  styles:
    card:
    - *pad0
    - min-width: '0'
    label: *label_left
  label: "[[[\n  const titles = { ground: 'Ground Floor', first: 'First Floor', attic: 'Attic' };\n  const cur = (states['input_select.dossier_plan_floor']||{}).state || 'ground';\n  return `\n    <div style=\"min-width:0;\">\n      <div style=\"font-size:clamp(20px,2.4cqw,32px); font-weight:700; color:var(--dos-ink); letter-spacing:-0.01em; line-height:1.05;\">${titles[cur] || titles.ground}</div>\n    </div>`;\n]]]\n"
# dos_footer_generated: footer timestamp + section numeral, used by the
# shared _partials/footer.yaml. The numeral derives from the view path so
# the partial needs no per-view configuration; keep the map in sync with
# the view order in lab.yaml (fill-options is unnumbered by design).
dos_footer_generated:
  <<: *show_label_only
  styles:
    card:
    - *pad0
    - *lineh1
    label: *label_right
  label: "[[[\n  const time = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});\n  const secs = {'dossier-general':'I','dossier-plan':'II','dossier-climate':'III','dossier-energy':'IV','dossier-garden':'V','dossier-checks':'VI','dossier-heating':'VII','dossier-cooling':'VIII'};\n  const slug = location.pathname.split('/').filter(Boolean).pop();\n  const sec = secs[slug] || (secs['dossier-' + slug] ? secs['dossier-' + slug] : (slug && slug.startsWith('dos') ? secs['dossier-general'] : null));\n  const tail = sec ? ` &middot; &sect;${sec} of VIII` : '';\n  return `<span style=\"font-size:clamp(9px,0.85cqw,10.5px); color:var(--dos-quiet); letter-spacing:0.04em; font-variant-numeric:tabular-nums; white-space:nowrap;\">generated ${time}${tail}</span>`;\n]]]\n"
# ---- Fixes at home (todo.fixes_at_home) ----------------------------
# dos_task_row: one open todo item, generated by auto-entities from
# sensor.fixes_at_home_open's `items` attribute (_partials/fixes.yaml).
# Tap completes the item; the row disappears when the mirror sensor
# refires. variables: summary, detail.
dos_task_row:
  <<: *show_label_only
  triggers_update: all
  tap_action:
    action: perform-action
    perform_action: todo.update_item
    target:
      entity_id: todo.fixes_at_home
    data:
      item: '[[[ return variables.summary ]]]'
      status: completed
  styles:
    card:
    - *pad0
    label: *label_left_wrap
  label: "[[[\n  const d = variables.detail ? `<div style=\"font-size:clamp(9.5px,0.9cqw,11px); color:var(--dos-quiet); margin:2px 0 0 18px;\">${variables.detail}</div>` : '';\n  return `<div style=\"padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <div style=\"display:flex; align-items:baseline; gap:8px;\">\n      <span style=\"width:10px; height:10px; border:0.8px solid var(--dos-soft); flex:none; align-self:center;\"></span>\n      <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text);\">${variables.summary}</span>\n    </div>${d}</div>`;\n]]]\n"
# dos_task_empty: placeholder row when the todo list has no open items.
dos_task_empty:
  <<: *show_label_only
  tap_action:
    action: none
  styles:
    card:
    - *pad0
    label: *label_left
  label: '[[[ return `<div style="padding:clamp(5px,0.7cqw,7px) 0; font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-quiet);">Nothing needs fixing</div>`; ]]]'
