  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const st = e ? e.state : null;\n  const ok = (st && st !== 'unavailable' && st !== 'unknown');\n  const label = ok ? (st === 'problem' ? 'attention' : 'healthy') : '—';\n  const col = (st === 'problem') ? 'var(--dos-accent2)' : 'var(--dos-quiet)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; ${variables.margin}\">\n    <span style=\"font-variant:small-caps; text-transform:lowercase; letter-spacing:0.05em; font-weight:600; font-size:clamp(11px,1cqw,12.5px); color:var(--dos-muted);\">${variables.name}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; color:${col}; font-weight:600;\">${label}</span></div>`;\n]]]\n"
  styles:
    card:
    - *pad0
    label: *label_left
dos_garden_battery_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  const v = (raw==null || raw==='unavailable' || raw==='unknown') ? null : parseFloat(raw);\n  const disp = (v==null||isNaN(v)) ? '—' : Math.round(v);\n  const u = (disp!=='—') ? `<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">%</span>` : '';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:${variables.pad}; border-bottom:none;\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">Sensor battery</span>\n    <span style=\"font-size:clamp(12.5px,1.15cqw,14px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}${u}</span></div>`;\n]]]\n"
  triggers_update: all
  styles:
    card:
    - *pad0
    label: *label_left_wrap
dos_garden_status_row:
  tap_action:
    action: more-info
  <<: *show_label_only
  label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const st = e ? e.state : null;\n  const ok = (st && st!=='unavailable' && st!=='unknown');\n  const txt = ok ? (st==='on' ? 'Active' : 'Inactive') : '—';\n  const col = (st==='on') ? 'var(--dos-accent)' : 'var(--dos-quiet)';\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:${col}; white-space:nowrap;\">${txt}</span></div>`;\n]]]\n"
  triggers_update: all
  styles:
    card:
    - *pad0
