        label: "[[[\n  const e = states['sensor.inverter_battery'];\n  const raw = e ? e.state : null;\n  const v = (raw==null||raw==='unavailable'||raw==='unknown') ? null : parseFloat(raw);\n  const pct = (v==null||isNaN(v)) ? 0 : Math.max(0, Math.min(100, v));\n  const disp = (v==null||isNaN(v)) ? '—' : Math.round(v);\n  return `\n    <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n      <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">Battery charge</span>\n      <span style=\"font-size:clamp(18px,2.2cqw,26px); font-weight:600; color:var(--dos-accent); font-variant-numeric:tabular-nums;\">${disp}<span style=\"font-size:clamp(9.5px,0.9cqw,11px); font-weight:400; color:var(--dos-soft); margin-left:3px;\">%</span></span>\n    </div>\n    <div style=\"height:4px; background:var(--dos-line); margin-top:6px; position:relative;\">\n      <div style=\"position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:var(--dos-accent);\"></div>\n    </div>\n    <div style=\"display:flex; justify-content:space-between; font-size:clamp(8px,0.8cqw,9px); color:var(--dos-quiet); letter-spacing:0.04em; margin-top:3px; font-variant-numeric:tabular-nums;\">\n      <span>0%</span><span>100%</span></div>`;\n]]]\n"
        styles:
          card:
          - padding: 8px 0 8px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:apexcharts-card
