          chart:
            height: 180
            parentHeightOffset: 0
            offsetX: -4
            toolbar: *id003
            animations: *id004
            sparkline: *id004
          grid:
            show: true
            strokeDashArray: 2
            padding: *id005
            xaxis: *id006
            yaxis: *id007
          legend: *id003
          tooltip:
            enabled: true
