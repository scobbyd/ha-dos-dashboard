              format: HH:mm
          stroke:
            width:
            - 1.3
            dashArray:
            - 0
            curve: smooth
            lineCap: round
          annotations:
            yaxis:
            - y: 0
              strokeDashArray: 3
              borderColor: rgba(140,133,122,0.55)
              opacity: 0.7
              label:
                text: 0%
                position: left
                textAnchor: start
                offsetX: 2
                borderWidth: 0
                style:
                  background: transparent
                  color: rgba(140,133,122,0.9)
                  fontSize: 8px
            - y: 100
              strokeDashArray: 3
              borderColor: rgba(140,133,122,0.55)
              opacity: 0.7
              label:
                text: 100%
                position: left
                textAnchor: start
                offsetX: 2
                borderWidth: 0
                style:
                  background: transparent
                  color: rgba(140,133,122,0.9)
                  fontSize: 8px
          dataLabels: *id004
          xaxis:
            type: datetime
            labels:
              show: true
              style:
                fontSize: 8px
              format: HH
            axisBorder: *id003
            axisTicks: *id003
          markers: *id008
        card_mod:
          style: "ha-card {\n  padding: 0 !important; margin: 4px 0 6px 0 !important;\n}\n"
      - type: custom:button-card
        template: dos_chart_legend
        variables:
          rows:
          - stroke: var(--dos-series1)
            dash: '0'
            label: State of charge
          desc: Battery charge over the last 24h, on a fixed 0&ndash;100% scale.
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        template: dos_section_header
        variables:
          title: Non-solar consumption
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/chart-nonsolar-14d
        hold_action:
          action: more-info
          entity: sensor.inverter_today_load_consumption
      - type: custom:button-card
        styles:
          card:
          - padding: 2px 0 2px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
        template: dos_section_caption
        variables:
          title: Per day &middot; 14 days
      - type: custom:apexcharts-card
        graph_span: 14d
        header: *id003
        series:
        - entity: sensor.inverter_today_load_consumption
          name: Daily
          color: '#5d8499'
          type: column
          group_by:
            func: max
            duration: 1d
        yaxis:
        - min: 0
          decimals: 0
          apex_config:
            show: true
            tickAmount: 3
            labels:
              offsetX: -2
              style:
                fontSize: 8px
              formatter: 'EVAL:function(v){ if (v == null) return ''''; return Math.round(v) + '' kWh''; }

                '
        apex_config:
          colors:
          - '#5d8499'
          chart:
            height: 180
            parentHeightOffset: 0
            offsetX: -4
            toolbar: *id003
            animations: *id004
          plotOptions:
            bar:
              columnWidth: 65%
              borderRadius: 0
          fill:
            opacity: 0.85
          grid:
            show: true
            strokeDashArray: 2
            padding: *id005
            xaxis: *id006
            yaxis: *id007
          legend: *id003
          dataLabels: *id004
          tooltip:
            enabled: true
            x:
              format: ddd dd
          annotations:
            yaxis:
            - y: 0
              strokeDashArray: 3
              borderColor: rgba(140,133,122,0.55)
              opacity: 0.7
          xaxis:
            type: datetime
            labels:
              show: true
              style:
                fontSize: 8px
              format: dd
            axisBorder: *id003
