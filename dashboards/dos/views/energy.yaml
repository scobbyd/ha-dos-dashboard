          stroke_width: 1.3
        yaxis:
        - min: 0
          max: 100
          decimals: 0
          apex_config:
            show: true
            tickAmount: 2
            labels:
              offsetX: -2
              style:
                fontSize: 8px
              formatter: 'EVAL:function(v){ if (v == null) return ''''; return Math.round(v) + ''%''; }

                '
        apex_config:
