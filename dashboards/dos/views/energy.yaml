        yaxis:
        - min: 0
          decimals: 0
          apex_config:
            show: true
            tickAmount: 3
            labels:
              offsetX: -2
              style:
                fontSize: 8px
              formatter: 'EVAL:function(v){ if (v == null) return ''''; return Math.round(v) + '' kWh''; }

                '
        apex_config:
          colors:
          - '#5d8499'
          - '#b5654d'
          - '#8c887f'
          - '#6b7a52'
          chart:
            height: 220
            parentHeightOffset: 0
            offsetX: -4
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            width:
            - 1.3
            - 1.3
            - 1.3
            - 1.3
            dashArray:
            - 0
            - 0
            - 2
            - 2
            curve: smooth
            lineCap: round
          fill:
            type:
            - solid
            - pattern
            - solid
            - solid
            opacity:
            - 0.12
            - 0.6
            - 0
            - 0
            pattern:
              style: slantedLines
              width: 6
              height: 6
              strokeWidth: 1.1
          grid:
            show: true
            strokeDashArray: 2
            padding:
              left: 2
              right: 8
              top: 8
