# _anchor_defs is not a lovelace/button-card key; it only hosts the YAML anchor
# definitions shared across this file, so deleting/reordering cards can't break aliases.
_anchor_defs:
- &id001
  border-radius: '0'
- &id014
  min-width: '0'
- &id002
  padding: '0'
- &id003
  show: false
- &id004
  enabled: false
- &id010
  - 1.3
  - 1.3
  - 1.3
- &id005
  left: 2
  right: 8
  top: 8
  bottom: 0
- &id006
  lines: *id003
- &id007
  lines:
    show: true
- &id008
  size: 0
- &id009
  legend_value: false
- &id012
  width: *id010
  curve: smooth
  lineCap: round
- &id013
  show: true
  strokeDashArray: 2
  xaxis: *id006
  yaxis: *id007
  padding: *id005
- &id015
  chart:
    height: 220
    toolbar: *id003
    animations: *id004
    offsetX: -4
  stroke: *id012
  legend:
    show: false
    position: bottom
    horizontalAlign: center
    fontSize: 11px
  tooltip:
    enabled: true
    shared: true
    y:
      formatter: EVAL:function(val) { if (val == null) return ''; return '€' + val.toFixed(2).replace('.', ',') + '/kWh'; }
  grid: *id013
  annotations:
    yaxis:
    - y: 0
      borderColor: rgba(140,133,122,0.55)
      strokeDashArray: 2
- &id016
  - id: price
    apex_config:
      stepSize: 0.1
      labels:
        formatter: EVAL:function(val) { if (val == null) return ''; return '€' + val.toFixed(2).replace('.', ','); }
- &id017
  - entity: sensor.tennet_imbalance_sell_price
    name: Imbalance Sell (actual)
    type: line
    color: '#5d8499'
    yaxis_id: price
    extend_to: false
    float_precision: 2
    unit: ' EUR/kWh'
    transform: return x / 1000;
    stroke_width: 1.3
  - entity: sensor.average_electricity_price
    name: Day-Ahead (ENTSO-E)
    type: line
    color: '#b5654d'
    yaxis_id: price
    extend_to: false
    float_precision: 2
    data_generator: return (entity.attributes.prices || []).map(p => [new Date(p.time).getTime(), p.price]);
    stroke_width: 1.3
  - entity: sensor.epex_predictor_nl
    name: EpexPredictor (LightGBM)
    type: line
    color: '#8c887f'
    yaxis_id: price
    extend_to: false
    float_precision: 2
    data_generator: return (entity.attributes.forecast || []).map(p => [new Date(p.datetime).getTime(), p.value]);
    stroke_width: 1.3
title: Energy
path: dossier-energy
icon: mdi:lightning-bolt
type: panel
theme: dos
cards:
- type: custom:stack-in-card
  mode: vertical
  card_mod: !include _partials/frame.yaml
  cards:
  - type: custom:stack-in-card
    mode: horizontal
    card_mod: !include _partials/header-bar.yaml
    cards:
    - type: custom:button-card
      template: dos_view_header
      variables:
        title: 'Energy'
    - type: custom:button-card
      tap_action:
        action: none
      template: dos_clock_time
  - type: custom:layout-card
    layout_type: custom:masonry-layout
    layout: !include _partials/masonry.yaml
    cards:
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        template: dos_section_header
        variables:
          title: Overview
      - type: custom:button-card
        entity: sensor.total_pv_power
        styles:
          card:
          - padding: 4px 0 8px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
        template: dos_gauge
        variables:
          txt: Solar production
          col: var(--dos-accent)
          ken: sensor.total_pv_energy_today
          kcol: var(--dos-text)
          mx: 14000
          abs: false
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/chart-solar-day
        hold_action:
          action: more-info
      - type: custom:button-card
        entity: sensor.inverter_load_ups_power
        styles:
          card:
          - padding: 4px 0 10px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
        template: dos_gauge
        variables:
          txt: House load
          col: var(--dos-accent2)
          ken: sensor.house_load_energy_today
          kcol: var(--dos-accent2)
          mx: 14000
          abs: true
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/chart-load-day
        hold_action:
          action: more-info
      - type: custom:button-card
        entity: sensor.inverter_grid_power
        template: dos_gauge_grid
        variables:
          txt: Grid power
          expen: sensor.inverter_today_energy_export
          impen: sensor.inverter_today_energy_import
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/chart-grid-day
        hold_action:
          action: more-info
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        triggers_update: all
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/chart-solar-day
        hold_action:
          action: more-info
          entity: sensor.solcast_pv_forecast_forecast_today
        label: "[[[\n  const a = states['sensor.total_pv_energy_today'];\n  const f = states['sensor.solcast_pv_forecast_forecast_today'];\n  const num = (e) => (e && !isNaN(parseFloat(e.state))) ? parseFloat(e.state).toFixed(1).replace('.', ',') : '—';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n    <span style=\"font-variant:small-caps; text-transform:lowercase; letter-spacing:0.06em; font-weight:700; font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-ink);\">Solar forecast, actual &amp; usage</span>\n    <span style=\"font-size:clamp(9.5px,0.9cqw,11px); color:var(--dos-quiet); font-variant-numeric:tabular-nums; white-space:nowrap;\">${num(a)} / ${num(f)} kWh</span></div>`;\n]]]\n"
        styles:
          card:
          - border-bottom: 0.8px solid var(--dos-ink)
          - padding: 0 0 6px 0
          - margin: 0 0 12px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: day
        header: *id003
        series:
        - entity: sensor.total_pv_power
          name: Produced
          unit: kW
          type: area
          color: '#5d8499'
          extend_to: now
          group_by:
            func: avg
            duration: 10min
          transform: 'return (x == null || x > 20000 || x < 0) ? null : x / 1000;'
          stroke_width: 1.3
        - entity: sensor.inverter_load_ups_power
          name: Consumption
          unit: kW
          type: area
          color: '#b5654d'
          extend_to: now
          group_by:
            func: avg
            duration: 10min
          transform: 'return (x == null || x < 0 || x > 20000) ? null : x / 1000;'
          stroke_width: 1.3
        - entity: sensor.solcast_pv_forecast_forecast_today
          name: Forecast
          unit: kW
          type: line
          color: '#8c887f'
          data_generator: 'return (entity.attributes.detailedForecast || []).map(function(p){ return [new Date(p.period_start).getTime(), p.pv_estimate]; });

            '
          stroke_width: 1.3
        yaxis:
        - min: 0
          decimals: 1
          apex_config:
            show: true
            tickAmount: 3
            labels:
              offsetX: -2
              style:
                fontSize: 8px
              formatter: 'EVAL:function(v){ if (v == null) return ''''; return v.toFixed(1).replace(''.'', '','') + '' kW''; }

                '
        apex_config:
          colors:
          - '#5d8499'
          - '#b5654d'
          - '#8c887f'
          chart:
            height: 220
            parentHeightOffset: 0
            offsetX: -4
            toolbar: *id003
            animations: *id004
          stroke:
            width: *id010
            dashArray:
            - 0
            - 0
            - 2
            curve: smooth
            lineCap: round
          fill:
            type:
            - solid
            - pattern
            - solid
            opacity:
            - 0.12
            - 0.6
            - 0
            pattern:
              style: slantedLines
              width: 6
              height: 6
              strokeWidth: 1.1
          grid:
            show: true
            strokeDashArray: 2
            padding: *id005
            xaxis: *id006
            yaxis: *id007
          legend: *id003
          dataLabels: *id004
          markers: *id008
          tooltip:
            enabled: true
            x:
              format: HH:mm
          annotations:
            yaxis:
            - y: 0
              strokeDashArray: 3
              borderColor: rgba(140,133,122,0.55)
              opacity: 0.7
          xaxis:
            type: datetime
            labels:
              show: true
              style:
                fontSize: 8px
              format: HH
            axisBorder: *id003
            axisTicks: *id003
        card_mod:
          style: "ha-card {\n  padding: 0 !important; margin: 2px 0 8px 0 !important;\n}\n/* mixed area+line chart: apexcharts gives every series rel=\"1\", so the theme's\n   ordinal rules can't target by order here. Style by series name instead. */\n.apexcharts-series[seriesName=\"Produced\"] path.apexcharts-area { stroke:var(--dos-series1) !important; stroke-width:1.8px !important; stroke-dasharray:0 !important; }\n.apexcharts-series[seriesName=\"Consumption\"] path.apexcharts-area { stroke:var(--dos-series2) !important; stroke-width:1.3px !important; stroke-dasharray:0 !important; }\n.apexcharts-series[seriesName=\"Forecast\"] path.apexcharts-line { stroke:var(--dos-series3) !important; stroke-width:1.3px !important; stroke-dasharray:1 4 !important; stroke-linecap:round !important; }\n"
      - type: custom:button-card
        template: dos_chart_legend
        variables:
          rows:
          - css: width:13px; height:9px; background:var(--dos-series1); opacity:0.65;
            label: Produced
          - css: width:13px; height:9px; background:var(--dos-series2); opacity:0.65;
            label: Usage
          - stroke: var(--dos-series3)
            dash: 1 4
            label: Forecast
          desc: Solcast forecast against the panels' actual output today. The gap is what cloud cover cost.
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        triggers_update: all
        tap_action:
          action: navigate
          navigation_path: /dos-dashboard/yearly-trend
        hold_action:
          action: more-info
          entity: sensor.solar_production_7d_ma
        label: "[[[\n  const p = states['sensor.solar_production_7d_ma'];\n  const u = states['sensor.house_consumption_7d_ma'];\n  const num = (e) => (e && !isNaN(parseFloat(e.state))) ? parseFloat(e.state).toFixed(1).replace('.', ',') : '\u2014';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n    <span style=\"font-variant:small-caps; text-transform:lowercase; letter-spacing:0.06em; font-weight:700; font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-ink);\">Solar &amp; usage &middot; 7-day trend</span>\n    <span style=\"font-size:clamp(9.5px,0.9cqw,11px); color:var(--dos-quiet); font-variant-numeric:tabular-nums; white-space:nowrap;\">${num(p)} / ${num(u)} kWh</span></div>`;\n]]]\n"
        styles:
          card:
          - border-bottom: 0.8px solid var(--dos-ink)
          - padding: 0 0 6px 0
          - margin: 0 0 12px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - padding: '0'
      - type: custom:apexcharts-card
        graph_span: 370d
