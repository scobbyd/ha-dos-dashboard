# _anchor_defs is not a lovelace key; it only hosts the YAML anchor definitions
# shared across this file, so deleting/reordering cards can't break aliases.
_anchor_defs:
- &id001
  border-radius: '0'
- &id002
  padding: '0'
title: Garden
path: dossier-garden
icon: mdi:flower
type: panel
theme: dos
cards:
- type: custom:stack-in-card
  mode: vertical
  card_mod: !include _partials/frame.yaml
  cards:
  - type: custom:stack-in-card
    mode: horizontal
    card_mod: !include _partials/header-bar.yaml
    cards:
    - type: custom:button-card
      template: dos_view_header
      variables:
        title: 'Garden'
    - type: custom:button-card
      tap_action:
        action: none
      template: dos_clock_time
  - type: custom:layout-card
    layout_type: custom:masonry-layout
    layout: !include _partials/masonry.yaml
    cards:
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        tap_action:
          action: none
        label: '[[[ return `<span style="font-variant:small-caps; text-transform:lowercase; letter-spacing:0.06em; font-weight:700; font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-ink);">Plants</span>`; ]]]

          '
        styles:
          card:
          - border-bottom: 0.8px solid var(--dos-ink)
          - padding: 0 0 6px 0
          - margin: 0 0 14px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
      - type: custom:button-card
        entity: plant.ivy_2
        template: dos_garden_plant_health
        variables:
          name: Ivy
          margin: margin-bottom:8px;
      - type: custom:flower-card
        entity: plant.ivy_2
        battery_sensor: sensor.flora1_battery
        show_bars:
        - moisture
        - conductivity
        - temperature
        - illuminance
        - dli
        display_type: full
        hide_units: false
        card_mod:
          style: "ha-card {\n  background: var(--dos-paper2) !important;\n  border: 0.8px solid var(--dos-line) !important;\n  border-radius: 0 !important; box-shadow: none !important;\n  font-family: 'Nimbus Sans L','Nimbus Sans','Helvetica Neue',Helvetica,Arial,sans-serif !important;\n  color: var(--dos-text) !important;\n  --primary-text-color: var(--dos-text);\n  --secondary-text-color: var(--dos-soft);\n  --card-background-color: var(--dos-paper2);\n  --ha-card-background: var(--dos-paper2);\n  margin: 0 0 8px 0 !important;\n}\n"
      - type: custom:button-card
        entity: plant.ivy_2
        variables:
          src: attr
          k: Moisture
          attr: moisture
          unit: '%'
          fmt: dec0
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.ivy_2
        variables:
          src: attr
          k: Conductivity
          attr: conductivity
          unit: µS/cm
          fmt: int
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.ivy_2
        variables:
          src: attr
          k: Temperature
          attr: temperature
          unit: °C
          fmt: dec1
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.ivy_2
        variables:
          src: attr
          k: Illuminance
          attr: illuminance
          unit: lx
          fmt: int
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.ivy_2
        variables:
          src: attr
          k: DLI
          attr: dli
          unit: mol/d
          fmt: dec1
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: sensor.flora1_battery
        template: dos_garden_battery_row
        variables:
          pad: clamp(5px,0.7cqw,7px) 0 12px 0
      - type: custom:button-card
        entity: plant.monstera
        template: dos_garden_plant_health
        variables:
          name: Monstera
          margin: margin:6px 0 8px 0;
      - type: custom:flower-card
        entity: plant.monstera
        battery_sensor: sensor.flora2_battery
        show_bars:
        - moisture
        - conductivity
        - temperature
        - illuminance
        - dli
        card_mod:
          style: "ha-card {\n  background: var(--dos-paper2) !important;\n  border: 0.8px solid var(--dos-line) !important;\n  border-radius: 0 !important; box-shadow: none !important;\n  font-family: 'Nimbus Sans L','Nimbus Sans','Helvetica Neue',Helvetica,Arial,sans-serif !important;\n  color: var(--dos-text) !important;\n  --primary-text-color: var(--dos-text);\n  --secondary-text-color: var(--dos-soft);\n  --card-background-color: var(--dos-paper2);\n  --ha-card-background: var(--dos-paper2);\n  margin: 0 0 8px 0 !important;\n}\n"
      - type: custom:button-card
        entity: plant.monstera
        variables:
          src: attr
          k: Moisture
          attr: moisture
          unit: '%'
          fmt: dec0
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.monstera
        variables:
          src: attr
          k: Conductivity
          attr: conductivity
          unit: µS/cm
          fmt: int
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.monstera
        variables:
          src: attr
          k: Temperature
          attr: temperature
          unit: °C
          fmt: dec1
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.monstera
        variables:
          src: attr
          k: Illuminance
          attr: illuminance
          unit: lx
          fmt: int
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: plant.monstera
        variables:
          src: attr
          k: DLI
          attr: dli
          unit: mol/d
          fmt: dec1
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: sensor.flora2_battery
        template: dos_garden_battery_row
        variables:
          pad: clamp(5px,0.7cqw,7px) 0
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        entity: binary_sensor.pond_aeration_should_run
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        label: "[[[\n  const e = states['binary_sensor.pond_aeration_should_run'];\n  const st = e ? e.state : null;\n  const ok = (st && st !== 'unavailable' && st !== 'unknown');\n  const note = ok ? (st === 'on' ? 'should run' : 'idle') : '—';\n  const col = (st === 'on') ? 'var(--dos-accent)' : 'var(--dos-quiet)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px;\">\n    <span style=\"font-variant:small-caps; text-transform:lowercase; letter-spacing:0.06em; font-weight:700; font-size:clamp(11.5px,1.05cqw,13px); color:var(--dos-ink);\">Pond aeration</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; color:${col}; font-weight:600;\">${note}</span></div>`;\n]]]\n"
        styles:
          card:
          - border-bottom: 0.8px solid var(--dos-ink)
          - padding: 0 0 6px 0
          - margin: 0 0 12px 0
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
      - type: custom:button-card
        entity: input_boolean.pond_aeration_enabled
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Enabled
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: switch.pond_pump
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Pump (manual when disabled)
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: sensor.outdoor_temp_30d_mean
        variables:
          k: 30-day outdoor mean
          unit: °C
          fmt: dec1
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: sensor.outdoor_temp_7d_mean
        variables:
          k: 7-day outdoor mean
          unit: °C
          fmt: dec1
          accent: false
          last: true
        template: dos_value_row
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: Summer override
      - type: custom:button-card
        entity: input_number.pond_aeration_override_days
        variables:
          k: Override length
          unit: days
          fmt: dec0
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: input_button.pond_aeration_override_start
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        tap_action:
          action: perform-action
          perform_action: input_button.press
          target:
            entity_id: input_button.pond_aeration_override_start
        hold_action:
          action: more-info
          entity: input_button.pond_aeration_override_start
        label: "[[[\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">Start override now</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; color:var(--dos-accent); white-space:nowrap; border:0.8px solid var(--dos-accent); padding:1px 7px;\">Press</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        entity: input_datetime.pond_aeration_override_until
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        triggers_update: all
        variables:
          k: Active until
          last: false
        label: "[[[\n  const e = states['input_datetime.pond_aeration_override_until'];\n  const raw = e ? e.state : null;\n  let disp = '—';\n  if (raw && raw!=='unavailable' && raw!=='unknown') {\n    const d = new Date(raw.replace(' ','T'));\n    disp = isNaN(d.getTime()) ? raw : d.toLocaleDateString('en-GB', {day:'numeric', month:'short'}) + ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});\n  }\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">Active until</span>\n    <span style=\"font-size:clamp(11.5px,1.05cqw,13px); font-weight:600; color:var(--dos-ink); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        entity: binary_sensor.pond_aeration_override_window
        template: dos_garden_status_row
        variables:
          k: Override window active
          last: true
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        template: dos_section_header
        variables:
          title: Pond &mdash; advanced
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: Seasonal threshold
      - type: custom:button-card
        entity: input_number.pond_aeration_temp_threshold
        variables:
          k: 30-day MA ON threshold
          unit: °C
          fmt: dec1
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: input_number.pond_aeration_hysteresis
        variables:
          k: Threshold hysteresis
          unit: °C
          fmt: dec1
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: binary_sensor.pond_aeration_warm_enough
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        triggers_update: all
        variables:
          k: Warm enough
          last: true
        label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const st = e ? e.state : null;\n  const ok = (st && st!=='unavailable' && st!=='unknown');\n  const txt = ok ? (st==='on' ? 'Yes' : 'No') : '—';\n  const col = (st==='on') ? 'var(--dos-accent)' : 'var(--dos-quiet)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:none;\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:${col}; white-space:nowrap;\">${txt}</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: Override window (daily on/off)
      - type: custom:button-card
        entity: input_datetime.pond_aeration_override_window_start
        variables:
          k: Window start
          last: false
        template: dos_time_window_row
      - type: custom:button-card
        entity: input_datetime.pond_aeration_override_window_end
        variables:
          k: Window end
          last: true
        template: dos_time_window_row
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: Summer dawn safety
      - type: custom:button-card
        entity: input_number.pond_aeration_dawn_temp_threshold
        variables:
          k: Dawn 7-day MA threshold
          unit: °C
          fmt: dec1
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: input_number.pond_aeration_dawn_hysteresis
        variables:
          k: Dawn threshold hysteresis
          unit: °C
          fmt: dec1
          accent: false
          last: false
        template: dos_value_row
      - type: custom:button-card
        entity: input_datetime.pond_aeration_dawn_window_start
        variables:
          k: Dawn window start
          last: false
        template: dos_time_window_row
      - type: custom:button-card
        entity: input_datetime.pond_aeration_dawn_window_end
        variables:
          k: Dawn window end
          last: false
        template: dos_time_window_row
      - type: custom:button-card
        entity: binary_sensor.pond_aeration_dawn_window
        template: dos_garden_status_row
        variables:
          k: Dawn window active
          last: true
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: EMS allow-list &mdash; run pump when state is
      - type: custom:button-card
        entity: input_boolean.pond_aeration_run_when_normal
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: NORMAL
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.pond_aeration_run_when_self_consume
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: SELF_CONSUME
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.pond_aeration_run_when_grid_use
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: GRID_USE
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.pond_aeration_run_when_dump
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: DUMP
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.pond_aeration_run_when_sell
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: SELL
          small: true
        template: dos_toggle_row
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: Current EMS state (read-only)
      - type: custom:button-card
        entity: input_select.ems_state
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        triggers_update: all
        label: "[[[\n  const e = states['input_select.ems_state'];\n  const raw = e ? e.state : null;\n  const disp = (raw==null || raw==='unavailable' || raw==='unknown') ? '—' : raw;\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:none;\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">EMS state</span>\n    <span style=\"font-size:clamp(9.5px,0.9cqw,11.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:var(--dos-accent); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
  - !include _partials/footer.yaml
