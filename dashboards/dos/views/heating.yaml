# _anchor_defs is not a lovelace/button-card key; it only hosts the YAML anchor
# definitions shared across this file, so deleting/reordering cards can't break aliases.
_anchor_defs:
- &id001
  border-radius: '0'
- &id005
  min-width: '0'
- &id002
  padding: '0'
title: Adv. Heating
path: dossier-heating
icon: mdi:fire
type: panel
theme: dos
cards:
- type: custom:stack-in-card
  mode: vertical
  card_mod: !include _partials/frame.yaml
  cards:
  - type: custom:stack-in-card
    mode: horizontal
    card_mod: !include _partials/header-bar.yaml
    cards:
    - type: custom:button-card
      template: dos_view_header
      variables:
        title: 'Adv. Heating'
    - type: custom:button-card
      tap_action:
        action: none
      template: dos_clock_time
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    show_label: true
    tap_action:
      action: none
    label: '[[[ return `<div style="font-size:clamp(11px,1.0cqw,12.5px); color:var(--dos-muted); letter-spacing:0.02em; line-height:1.5; max-width:78ch;">Strategic heating for the living room. Picks between the Daikin AC and the Micronova pellet stove based on forecast weather, EPEX prices, solar production, and battery SOC.</div>`; ]]]

      '
    styles:
      card:
      - padding: 0 0 18px 0
      label:
      - font-family: inherit
      - text-align: left
      - justify-self: stretch
      - *id002
      - white-space: normal
  - type: custom:layout-card
    layout_type: custom:masonry-layout
    layout: !include _partials/masonry.yaml
    cards:
    - type: custom:stack-in-card
      mode: vertical
      cards:
      - type: custom:button-card
        template: dos_section_header
        variables:
          title: Status &amp; mode
      - type: custom:button-card
        entity: input_boolean.heating_system_enabled
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Master Switch
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_select.heating_mode
        triggers_update: all
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        variables:
          k: Mode
          last: false
        label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  const disp = (raw==null||raw==='unavailable'||raw==='unknown') ? '—' : raw.replace(/_/g,' ');\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:var(--dos-accent); font-variant-numeric:tabular-nums; white-space:nowrap;\">${disp}</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        entity: input_boolean.heating_ac_available
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: AC Available
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.heating_pellet_available
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Pellet Available
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.heating_pellet_only_override
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Pellet-Only Override
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.heating_pellet_fuel_exhausted
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: Fuel Exhausted
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        entity: input_boolean.heating_external_pause
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        variables:
          k: External Pause (manual AC off)
          last: false
        template: dos_toggle_row
      - type: custom:button-card
        template: dos_subheader
        variables:
          title: decision
      - type: custom:button-card
        entity: sensor.heating_active_plan_source
        triggers_update: all
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        variables:
          k: Current Source
          accent: true
          last: false
        label: "[[[\n  const e = (entity && entity.entity_id) ? states[entity.entity_id] : null;\n  const raw = e ? e.state : null;\n  const disp = (raw==null||raw==='unavailable'||raw==='unknown') ? '—' : raw.replace(/_/g,' ');\n  const last = variables.last ? 'none' : '0.6px solid var(--dos-line)';\n  const vcol = variables.accent ? 'var(--dos-accent)' : 'var(--dos-ink)';\n  return `<div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:clamp(5px,0.7cqw,7px) 0; border-bottom:${last};\">\n    <span style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap;\">${variables.k}</span>\n    <span style=\"font-size:clamp(11px,1.0cqw,12.5px); font-weight:600; color:${vcol}; text-align:right; overflow:hidden; text-overflow:ellipsis;\">${disp}</span></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        entity: sensor.heating_active_plan_reason
        triggers_update: all
        show_icon: false
        show_name: false
        show_state: false
        show_label: true
        label: "[[[\n  const s = states['sensor.heating_active_plan_reason'];\n  const raw = s ? s.state : null;\n  const disp = (raw==null||raw==='unavailable'||raw==='unknown') ? '—' : raw;\n  return `<div style=\"padding:clamp(5px,0.7cqw,7px) 0; border-bottom:0.6px solid var(--dos-line);\">\n    <div style=\"font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text);\">Reason</div>\n    <div style=\"font-size:clamp(10.5px,0.95cqw,12px); color:var(--dos-muted); margin-top:3px; line-height:1.4;\">${disp}</div></div>`;\n]]]\n"
        styles:
          card:
          - *id002
          label:
          - font-family: inherit
          - text-align: left
          - justify-self: stretch
          - *id002
          - white-space: normal
          - overflow: visible
      - type: custom:button-card
        entity: sensor.heating_effective_target
        variables:
          k: Effective Target
          unit: °C
          fmt: dec1
          sub: ''
          accent: true
          last: false
