        card_mod: *detail_card_mod
        label: "[[[\n  return `<div style=\"padding-top:6px; font-size:12.5px; color:var(--dos-quiet); line-height:1.6; text-align:left;\">\n    <div style=\"font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--dos-soft); margin-bottom:12px;\">Select a room</div>\n    Tap any room on the plan to read its values and adjust it here.\n    <div style=\"margin-top:18px; display:flex; flex-direction:column; gap:10px;\">\n      <span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:16px; height:16px; background:var(--dos-accent2); opacity:0.32; flex:0 0 16px;\"></span>Heating &mdash; terracotta wash, deeper = working harder</span>\n      <span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:16px; height:16px; background:var(--dos-accent); opacity:0.32; flex:0 0 16px;\"></span>Cooling &mdash; slate wash</span>\n      <span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:16px; text-align:center; color:var(--dos-soft); flex:0 0 16px;\">&#9650;&#9660;</span>Above / below setpoint</span>\n      <span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:16px; height:12px; border:1.5px dashed var(--dos-line); flex:0 0 16px; box-sizing:border-box;\"></span>House footprint below (upper floors)</span>\n    </div></div>`;\n]]]\n"
