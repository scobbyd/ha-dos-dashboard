# Plan — interactive floor-plan view (Claude Design handoff, June 2026).
# Standard page header (floor title + clock + ink rule) above a
# landscape split from plan.jsx (DossierPlanWide): a left rail (floor
# switcher, inline room detail / legend) beside a full-height plan
# stage; collapses to the stacked phone flow below 1000px.
# Underlay SVGs come from tools/floorplan/export.js into www/floorplans/
# (day + night per floor; night walls recede to putty, a -night-ink
# variant exists for comparison; upper floors carry a faint ground-floor
# ghost). Room overlay positions are percentages of the padded SVG
# viewBox, printed by the export script; rerun it after any geometry
# change and re-paste the numbers. Helpers: packages/ui/dossier_plan.yaml.
_anchor_defs:
- &id002
  border-radius: '0'
- &id003
  padding: '0'
- &plan_card_mod
  style: |
    ha-card {
      width: min(100%, calc((100vh - 230px) * 0.9514));
      margin: 0 auto !important;
      container-type: inline-size; container-name: plan;
    }
# Segment boxes: the embedded hui-horizontal-stack's flex #root lives in a
# nested shadow root card-mod cannot reach; its 8px gap is killed via the
# inheriting --horizontal-stack-card-gap custom property instead.
- &chipbox_card_mod
  style: ':host > ha-card { background: transparent !important; box-shadow: none !important; border: 1px solid var(--dos-line) !important; border-radius: 0 !important; --horizontal-stack-card-gap: 0px; }

    :host { flex: 0 0 auto !important; }

    '
- &switcher_card_mod
  style: ':host > ha-card { background: transparent !important; box-shadow: none !important; border: 1px solid var(--dos-line) !important; border-radius: 0 !important; --horizontal-stack-card-gap: 0px; }

    '
- &detail_card_mod
  style: 'ha-card { border-top: 1.5px solid var(--dos-ink) !important; margin: 22px 0 0 0 !important; padding: 12px 0 0 0 !important; }

    '
# Room music block for the detail panels: strip-A music card (idle fold)
# + segmented transport, both driven by sensor.music_now (packages/media/
# music_rooms.yaml). Volume chips live at the call sites because they
# target the room's own Marantz zone (marantz_1 living, marantz_2 bedroom).
- &music_strip
  type: custom:button-card
  entity: sensor.music_now
  show_icon: false
  show_name: false
  show_state: false
  show_label: true
  triggers_update: all
  tap_action:
    action: perform-action
    perform_action: media_player.media_play_pause
    target:
      entity_id: '[[[ return (states["sensor.music_now"]||{attributes:{}}).attributes.player || "media_player.ma_marantz"; ]]]'
  hold_action:
    action: more-info
    entity: '[[[ return (states["sensor.music_now"]||{attributes:{}}).attributes.player || "sensor.music_now"; ]]]'
  label: |
    [[[
      const now = states['sensor.music_now'];
      const st = now ? now.state : 'idle';
      const player = now ? (now.attributes.player || '') : '';
      const e = player ? states[player] : null;
      const a = e ? e.attributes : {};
      const playing = st === 'playing';
      const frame = 'margin-top:12px; border-top:0.6px solid var(--dos-line); padding:9px 0 2px 0;';
      if (st !== 'playing' && st !== 'paused') {
        return `<div style="${frame} display:flex; justify-content:space-between; align-items:baseline; gap:8px;">
          <span style="font-size:clamp(12px,1.1cqw,13.5px); font-style:italic; color:var(--dos-quiet);">No media playing</span>
          <span style="font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:var(--dos-quiet);">idle</span></div>`;
      }
      const title = a.media_title || '—';
      const artist = a.media_artist ? `<span style="color:var(--dos-soft);"> · ${a.media_artist}</span>` : '';
      const where = now ? (now.attributes.rooms || '') : '';
      const col = playing ? 'var(--dos-accent)' : 'var(--dos-quiet)';
      const fmt = (s) => { if (s==null||isNaN(s)) return null; s = Math.max(0, Math.round(s)); return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); };
      let pos = a.media_position;
      if (pos!=null && a.media_position_updated_at && playing) pos += (Date.now() - Date.parse(a.media_position_updated_at))/1000;
      if (pos!=null && a.media_duration) pos = Math.min(pos, a.media_duration);
      const pct = (pos!=null && a.media_duration) ? Math.max(0, Math.min(100, pos / a.media_duration * 100)) : 0;
      const el = fmt(pos) || '–:––';
      const rem = (pos!=null && a.media_duration) ? ('−' + fmt(a.media_duration - pos)) : '';
      return `<div style="${frame}">
        <div style="display:flex; justify-content:space-between; align-items:baseline; gap:8px;">
          <span style="font-size:clamp(12px,1.1cqw,13.5px); color:var(--dos-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;">${title}${artist}</span>
          <span style="font-size:clamp(9px,0.85cqw,10.5px); letter-spacing:0.08em; text-transform:uppercase; font-weight:600; color:${col}; white-space:nowrap;">${where}</span></div>
        <div style="height:3px; background:var(--dos-line); margin-top:8px; position:relative;">
          <div style="position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:${col};"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:clamp(8.5px,0.8cqw,9.5px); color:var(--dos-quiet); letter-spacing:0.04em; margin-top:4px; font-variant-numeric:tabular-nums;"><span>${el}</span><span>${rem}</span></div></div>`;
    ]]]
  styles:
    card:
    - padding: '0'
    label:
    - font-family: inherit
    - text-align: left
    - justify-self: stretch
    - padding: '0'
    - min-width: '0'
- &music_transport
  type: custom:stack-in-card
  mode: horizontal
  card_mod: *switcher_card_mod
  cards:
  - type: custom:button-card
    template: dos_seg
    tap_action:
      action: perform-action
      perform_action: media_player.media_previous_track
      target:
        entity_id: '[[[ return (states["sensor.music_now"]||{attributes:{}}).attributes.player || "media_player.ma_marantz"; ]]]'
    label: '[[[ return `<div style="height:100%; display:flex; align-items:center; justify-content:center;"><span style="font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; line-height:1; color:var(--dos-quiet); white-space:nowrap;">prev</span></div>`; ]]]'
  - type: custom:button-card
    template: dos_seg
    entity: sensor.music_now
    triggers_update: all
    tap_action:
      action: perform-action
      perform_action: media_player.media_play_pause
      target:
        entity_id: '[[[ return (states["sensor.music_now"]||{attributes:{}}).attributes.player || "media_player.ma_marantz"; ]]]'
    label: |
      [[[
        const playing = (states['sensor.music_now']||{}).state === 'playing';
        return `<div style="height:100%; box-sizing:border-box; display:flex; align-items:center; justify-content:center; border-left:1px solid var(--dos-line); background:${playing ? 'var(--dos-ink)' : 'transparent'};"><span style="font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; line-height:1; color:${playing ? 'var(--dos-paper)' : 'var(--dos-quiet)'}; white-space:nowrap;">${playing ? 'pause' : 'play'}</span></div>`;
      ]]]
  - type: custom:button-card
    template: dos_seg
    tap_action:
      action: perform-action
      perform_action: media_player.media_next_track
      target:
        entity_id: '[[[ return (states["sensor.music_now"]||{attributes:{}}).attributes.player || "media_player.ma_marantz"; ]]]'
    label: '[[[ return `<div style="height:100%; box-sizing:border-box; display:flex; align-items:center; justify-content:center; border-left:1px solid var(--dos-line);"><span style="font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; line-height:1; color:var(--dos-quiet); white-space:nowrap;">next</span></div>`; ]]]'
title: Plan
path: dossier-plan
icon: mdi:floor-plan
type: panel
theme: dos
cards:
- type: custom:stack-in-card
  mode: vertical
  card_mod: !include _partials/frame.yaml
  cards:
  - type: custom:stack-in-card
    mode: horizontal
    card_mod: !include _partials/header-bar.yaml
    cards:
    - type: custom:button-card
