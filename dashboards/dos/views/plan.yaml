    layout_type: custom:grid-layout
    layout:
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr)
      grid-template-rows: auto 1fr
      grid-template-areas: |
        "chrome plan"
        "detail plan"
      grid-column-gap: 36px
      margin: 0
      padding: 0
      mediaquery:
        '(max-width: 1000px)':
          grid-template-columns: minmax(0, 1fr)
          grid-template-rows: none
          grid-template-areas: |
            "chrome"
            "plan"
            "detail"
    cards:
    # ---- left rail chrome: masthead + floor switcher ------------------
    - type: custom:stack-in-card
      mode: vertical
      view_layout:
        grid-area: chrome
      cards:
      - type: custom:stack-in-card
