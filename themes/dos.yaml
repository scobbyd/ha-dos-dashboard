# DOS dashboard theme.
#
# All views in dashboards/dos/ point at `theme: dos`. The theme carries the
# full dossier palette (day tokens as theme variables, night flip via
# card-mod-card) and strips card chrome (background/border/shadow/radius)
# theme-wide, so cards need no per-card resets.

dos:
  # Card chrome defaults: dossier cards are flat ink-on-paper, the frame
  # card supplies the only visible surface.
  ha-card-background: "none"
  ha-card-border-radius: "0"
  ha-card-border-width: "0"
  ha-card-box-shadow: "none"
  # Hover feedback: one ink-toned ripple for every interactive card, day
  # and night (var resolves at the ripple). These theme keys cover plain
  # cards; button-card overrides --ha-ripple-color per element with the
  # entity's state color (dead entities hover grey), so card-mod-card
  # below re-overrides it with !important.
  ha-ripple-color: "var(--dos-ink)"
  mdc-ripple-color: "var(--dos-ink)"
  # NOTE on page chrome (HA toolbar / view background): NOT themable from
  # here. This theme is applied per VIEW, which only sets variables on the
  # hui-view element; the header lives outside it, and card-mod-root reads
  # the GLOBAL theme. Recoloring the toolbar would require selecting
  # dos as the profile/global theme, which would impose the
  # transparent-card defaults above on every other dashboard. Tested and
  # reverted 2026-06-10.
  # Dossier palette tokens, DAY set, as theme-level fallbacks. The frame
  # card_mod (views/_partials/frame.yaml) overrides these per page and flips
  # them at night via input_boolean.dossier_night_mode; if that card-mod
  # render ever drops out (it is occasionally flaky on config reloads),
  # views degrade to correct day colours instead of unstyled defaults.
  dos-paper: "#f5f5f4"
  dos-paper2: "#ececea"
  dos-ink: "#0d1b2a"
  dos-text: "#1a1a1a"
  dos-muted: "#4a4a4a"
  dos-soft: "#6b6b6b"
  dos-quiet: "#8a8a8a"
  dos-line: "#d4d4d4"
  dos-accent: "#3e5567"
  dos-accent2: "#8a3f33"
  dos-glow: "#d9b96a"
  dos-series1: "#5d8499"
  dos-series2: "#b5654d"
  dos-series3: "#8c887f"
  dos-series4: "#6b7a52"
  card-mod-theme: dos
  card-mod-card: |
    {% if is_state('input_boolean.dossier_night_mode','on') %}
    /* Night palette. Day values come from the theme tokens above; setting
       these on every ha-card lets all descendants (and any nested card
       card-mod misses) inherit them. The day/night flip used to live in
       views/_partials/frame.yaml; keep export.js palettes in sync. */
    ha-card {
      --dos-paper:#17140f; --dos-paper2:#201c16;
      --dos-ink:#f2efe8;  --dos-text:#dcd8d0;  --dos-muted:#b6b1a8;
      --dos-soft:#97928a; --dos-quiet:#6e6a62; --dos-line:#38332c;
      --dos-accent:#82a2b6; --dos-accent2:#c77b5e; --dos-glow:#f0e3b2;
    }
    {% endif %}
    ha-card { --ha-ripple-color: var(--dos-ink) !important; }
    .apexcharts-gridline { stroke: rgba(140,133,122,0.45) !important; opacity: .6; }
    .apexcharts-yaxis-texts-g text,
    .apexcharts-xaxis-texts-g text { fill: rgba(140,133,122,0.9) !important; }
    .apexcharts-yaxis-annotations line,
    .apexcharts-xaxis-annotations line { stroke: rgba(140,133,122,0.55) !important; }
    .apexcharts-yaxis-annotation-label { fill: rgba(140,133,122,0.9) !important; }
    .apexcharts-legend-text { color: var(--dos-muted) !important; }
    .apexcharts-text,
    .apexcharts-datalabel,
    .apexcharts-data-labels text,
    .apexcharts-legend-text,
    .apexcharts-yaxis-label,
    .apexcharts-xaxis-label,
    .apexcharts-yaxis-annotation-label { font-family: 'Nimbus Sans L','Helvetica Neue',Helvetica,Arial,sans-serif !important; }
    .apexcharts-tooltip { background:#2a2622 !important; color:#e8e4dc !important; border:1px solid rgba(140,133,122,0.5) !important; box-shadow:none !important; font-family:'Nimbus Sans L','Helvetica Neue',Helvetica,Arial,sans-serif !important; }
    .apexcharts-tooltip-title { background:#201c16 !important; border-bottom:1px solid rgba(140,133,122,0.5) !important; }
    /* Ordinal line design: 1 blue solid, 2 terracotta dashed, 3 grey dotted, 4 green dot-dash.
       Series carry rel="1..4" by order, so convention-ordered charts need no per-chart line CSS.
       Scoped to path.apexcharts-line so bars and area fills are untouched. Width stays per chart
       (apex_config.stroke.width). A chart with a non-convention order overrides these in its own
       card_mod using the same specificity (.apexcharts-series[...] path.apexcharts-line). */
    .apexcharts-series[rel="1"] path.apexcharts-line { stroke: var(--dos-series1) !important; stroke-dasharray: 0 !important;       stroke-linecap: butt !important; }
    .apexcharts-series[rel="2"] path.apexcharts-line { stroke: var(--dos-series2) !important; stroke-dasharray: 7 4 !important;     stroke-linecap: butt !important; }
    .apexcharts-series[rel="3"] path.apexcharts-line { stroke: var(--dos-series3) !important; stroke-dasharray: 1 4 !important;     stroke-linecap: round !important; }
    .apexcharts-series[rel="4"] path.apexcharts-line { stroke: var(--dos-series4) !important; stroke-dasharray: 8 3 1 3 !important; stroke-linecap: round !important; }
